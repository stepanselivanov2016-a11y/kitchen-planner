name: Kitchen Planner system tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  backend-system:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kitchen_planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kitchen_planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/kitchen_planner
      JWT_SECRET_KEY: system-test-secret-key-for-kitchen-planner
      OLLAMA_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: qwen2.5:3b
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install backend dependencies
        working-directory: engine
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pytest pytest-cov

      - name: Run backend unit and system tests
        working-directory: engine
        run: pytest --cov=app --cov-report=term-missing

  frontend-system:
    runs-on: ubuntu-latest
    needs: backend-system
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kitchen_planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kitchen_planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/kitchen_planner
      JWT_SECRET_KEY: system-test-secret-key-for-kitchen-planner
      NEXT_PUBLIC_ENGINE_URL: http://127.0.0.1:8000
      OLLAMA_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: qwen2.5:3b
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install backend dependencies
        working-directory: engine
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run frontend unit tests
        working-directory: web
        run: npm test

      - name: Run browser system tests
        working-directory: web
        run: npm run test:system

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
